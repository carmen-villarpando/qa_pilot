name: QA_Pilot

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  qa-pilot:
    if: !github.event.issue.pull_request && contains(github.event.comment.body, '/qa-pilot')
    runs-on: ubuntu-latest
    steps:
      - name: Debug event
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Has PR: ${{ github.event.issue.pull_request }}"
          echo "Comment body: ${{ github.event.comment.body }}"
          echo "Contains /qa-pilot: ${{ contains(github.event.comment.body, '/qa-pilot') }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run QA Pilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          AI_PROVIDER: github_models
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          uv run python app/main_qa_pilot.py
